[pytest]
env =
    OPENAGENTD_DATA_DIR=.tests/data
    OPENAGENTD_CONFIG_DIR=.tests/config
    OPENAGENTD_STATE_DIR=.tests/state
    OPENAGENTD_CACHE_DIR=.tests/cache
    OPENAGENTD_WIKI_DIR=.tests/wiki
asyncio_mode = auto
testpaths = tests
pythonpath = .
addopts =
    --cov=app
    --cov-report=term-missing:skip-covered
    --no-cov-on-fail
    -q
markers =
    asyncio: mark a test as an asyncio-based test.
    slow: mark a test as slow.

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
