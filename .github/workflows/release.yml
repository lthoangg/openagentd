name: Release

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'release' to confirm"
        required: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'release'
    permissions:
      contents: write
      id-token: write  # for PyPI OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(cat app/version.txt | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists. Bump the version before releasing."
            exit 1
          fi

      - uses: astral-sh/setup-uv@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Build web UI
        run: |
          cd web && bun install && bun run build && cd ..
          mkdir -p app/_web_dist
          cp -r web/dist/* app/_web_dist/

      - name: Build package
        run: uv build

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" \
            -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            dist/*.whl dist/*.tar.gz \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --verify-tag

      - name: Publish to PyPI
        run: uv publish
