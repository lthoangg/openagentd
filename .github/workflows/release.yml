name: Release

on:
  workflow_dispatch:
    inputs:
      component:
        description: "Component to release"
        required: true
        type: choice
        options:
          - app
          - web
      confirm:
        description: "Type 'release' to confirm"
        required: true

jobs:
  release:
    name: Release ${{ github.event.inputs.component }}
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'release'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version for component
        id: version
        run: |
          COMPONENT="${{ github.event.inputs.component }}"
          case "$COMPONENT" in
            app)
              VERSION=$(cat app/version.txt | tr -d '[:space:]')
              ;;
            web)
              VERSION=$(node -p "require('./web/package.json').version")
              ;;
          esac
          TAG="${COMPONENT}-v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "component=$COMPONENT" >> "$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists. Bump the version before releasing."
            exit 1
          fi

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" \
            -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          COMPONENT="${{ steps.version.outputs.component }}"
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "$TAG" \
            --title "${COMPONENT} ${VERSION}" \
            --generate-notes \
            --verify-tag

    outputs:
      component: ${{ steps.version.outputs.component }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

  # ── Publish to PyPI (app component only) ──────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.component == 'app'
    permissions:
      id-token: write  # for trusted publishing (PyPI OIDC)

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: astral-sh/setup-uv@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Build web UI
        run: |
          cd web && bun install && bun run build && cd ..
          mkdir -p app/_web_dist
          cp -r web/dist/* app/_web_dist/

      - name: Build package
        run: uv build

      - name: Upload wheel to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release.outputs.tag }}" dist/*.whl dist/*.tar.gz

      - name: Publish to PyPI
        run: uv publish
