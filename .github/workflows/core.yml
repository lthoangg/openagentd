name: Core

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/core.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/core.yml"

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --frozen

      - name: ruff lint
        run: uv run ruff check app/ tests/

      - name: ruff format check
        run: uv run ruff format --check app/ tests/

      - name: ty
        run: uv run ty check app/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest --no-cov -q

  # Required by branch protection — aggregates lint + test into the expected check name.
  # Also acts as a no-op pass when path filters skip the real jobs (e.g. web-only PRs).
  core-status:
    name: Core (lint, type check, test)
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || "${{ needs.test.result }}" != "success" ]]; then
            echo "lint=${{ needs.lint.result }} test=${{ needs.test.result }}"
            exit 1
          fi
          echo "All core checks passed."
