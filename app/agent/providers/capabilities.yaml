# Model capabilities registry — exact model overrides.
#
# Only *exact* provider:model entries belong here. Defaults and prefix
# fallbacks live in capabilities.py (infrastructure logic).
#
# Lookup order: exact match (this file) → longest prefix → defaults.
#
# Each entry uses *sparse merge* — only specify fields that differ from
# defaults. Omitted fields inherit the default value.
#
# Convention: list flagship / pinned models even when they match the
# prefix default. They double as a "known good" registry surfaced to
# operators picking a model. Exotic variants without overrides should
# stay implicit (handled by the prefix fallback in capabilities.py).

# ── OpenAI ──────────────────────────────────────────────────────────────────
# Prefix default: vision=true. Entries below are pinned for visibility.
"openai:gpt-5.5":
  input:
    vision: true
"openai:gpt-5.4":
  input:
    vision: true
"openai:gpt-5.4-mini":
  input:
    vision: true
"openai:gpt-5.4-pro":
  input:
    vision: true
"openai:gpt-5":
  input:
    vision: true
"openai:gpt-5-mini":
  input:
    vision: true
"openai:gpt-4.1":
